<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EBP Producciones — Panel de administración</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

  <header class="cabecera">
    <div class="cabecera-contenido">
      <div class="marca">
        <span class="marca-logo">EBP</span>
        <span class="marca-nombre">EBP Producciones — Admin</span>
      </div>
      <nav id="nav-sesion">
        <a href="index.html">Ver sitio</a>
        <button class="boton-secundario" onclick="cerrarSesion()">Salir</button>
      </nav>
    </div>
  </header>

  <main class="admin-grid">

    <section id="admin-guard" class="tarjeta">
      <p class="cargando">Verificando acceso…</p>
    </section>

    <div id="admin-contenido" class="admin-grid oculto">

      <!-- Sorteo activo / crear sorteo -->
      <section class="tarjeta">
        <h2>Sorteo</h2>
        <div id="admin-sorteo"></div>
      </section>

      <!-- Órdenes -->
      <section class="tarjeta">
        <h2>Órdenes de compra</h2>
        <div class="tabla-scroll" id="admin-ordenes">
          <p class="cargando">Cargando…</p>
        </div>
      </section>

      <!-- Usuarios -->
      <section class="tarjeta">
        <h2>Usuarios</h2>
        <p class="sorteo-descripcion">Los usuarios se registran y verifican solos. Aquí puedes bloquear
        una cuenta (no podrá comprar) o volver a autorizarla.</p>
        <div class="tabla-scroll" id="admin-usuarios">
          <p class="cargando">Cargando…</p>
        </div>
      </section>

    </div>

  </main>

  <footer class="pie">
    <span class="marca-agua">@EBP_PRODUCCIONES 2026</span>
    <span>Panel de administración</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
